name: CI

# Gate between push/PR and the Vercel prod deploy: typecheck + unit tests must
# pass. Before this workflow existed, `git push origin main` went straight to
# a prod deploy with zero automated verification.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    # npm ci + tsc + vitest take ~3 min; anything past 15 is a hung runner.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm test
