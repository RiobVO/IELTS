name: db-backup

# Free daily logical backup of the production database, kept as a workflow
# ARTIFACT (never committed — a dump carries PII and would leak via the repo).
# pg_dump is read-only; it never mutates the source DB. This exists because an
# accidental remote `db:down` once wiped prod and there was no backup to restore.
#
# SETUP (owner, one-time): add a repository secret BACKUP_DATABASE_URL
#   (Settings → Secrets and variables → Actions → New repository secret).
#   Use the SESSION/DIRECT connection string (Supabase session pooler, port 5432)
#   — pg_dump needs session-level features the transaction pooler (6543) lacks.
#
# RESTORE: download the artifact, gunzip, then `psql "$TARGET" < dump.sql` into a
#   throwaway or restored database. The dump is plain SQL (--no-owner/--no-privileges
#   so it restores cleanly into any role).

on:
  schedule:
    # 02:17 UTC daily (off the hour to avoid the cron stampede).
    - cron: "17 2 * * *"
  workflow_dispatch: {} # allow a manual run from the Actions tab

# Never let two backups overlap (a long dump + the next tick).
concurrency:
  group: db-backup
  cancel-in-progress: false

jobs:
  dump:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Guard — backup secret is configured
        env:
          BACKUP_DATABASE_URL: ${{ secrets.BACKUP_DATABASE_URL }}
        run: |
          if [ -z "$BACKUP_DATABASE_URL" ]; then
            echo "::error::BACKUP_DATABASE_URL is not set. Add it in Settings → Secrets and variables → Actions (use the Supabase session/direct connection string)."
            exit 1
          fi

      - name: Compute dump filename
        id: meta
        run: echo "name=db-backup-$(date -u +%Y%m%d-%H%M%S).sql.gz" >> "$GITHUB_OUTPUT"

      - name: pg_dump (read-only) → gzip
        env:
          BACKUP_DATABASE_URL: ${{ secrets.BACKUP_DATABASE_URL }}
        # Run pg_dump from the official postgres:17 image — keep the pin in LOCKSTEP
        # with the Supabase server major (17.x today): an older client refuses with
        # "server version mismatch" (that bug produced empty gzips for days), while a
        # newer client's dump isn't guaranteed to restore into a same-major DR target.
        # When Supabase upgrades its major, this step fails loud — bump the pin then. The
        # secret is passed into the container by name (-e VAR without a value), so it
        # never appears in the process argv. `shell: bash` is explicit because only
        # the explicit form enables pipefail — the implicit default is plain `bash -e`,
        # which let the pg_dump failure vanish behind gzip's exit 0.
        shell: bash
        run: |
          docker run --rm -e BACKUP_DATABASE_URL postgres:17 \
            sh -c 'pg_dump --no-owner --no-privileges "$BACKUP_DATABASE_URL"' \
            | gzip -9 > "${{ steps.meta.outputs.name }}"
          ls -lh "${{ steps.meta.outputs.name }}"
          # Belt-and-braces: an "empty but valid" gzip is ~20 bytes; a real dump is MBs.
          size=$(stat -c%s "${{ steps.meta.outputs.name }}")
          [ "$size" -ge 10240 ] || { echo "::error::dump is only ${size} bytes — empty backup"; exit 1; }

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.name }}
          path: ${{ steps.meta.outputs.name }}
          retention-days: 30
          if-no-files-found: error
