# Local Postgres for `npm run verify` when you don't have a live Supabase DB.
# `npm run docker:db` then point DATABASE_URL at it (see .env.example).
services:
  db:
    image: postgres:16-alpine
    container_name: ielts_pg
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 2s
      timeout: 3s
      retries: 30
